# OWASP ZAP Baseline Scan Configuration - Harper Fabric apps
# Format: <rule_id> <action> <description>
# Actions: IGNORE (skip rule), WARN (report but do not fail), FAIL (fail on finding)

# The fastify static/shell layer now emits these on HTML documents
# (harper-app/seo_shell.js + static-web/index.js), so a regression that drops
# them is a real defect, not proxy-owned. CSP is scoped to frame-ancestors
# 'none' today; broaden before tightening this rule further.
10035	FAIL	(Strict-Transport-Security Header Not Set)
10021	FAIL	(X-Content-Type-Options Header Missing)
10038	FAIL	(Content Security Policy (CSP) Header Not Set)
90004	WARN	(Cross-Origin-Resource-Policy Header Missing or Invalid)

# Static/browser surfaces should not disclose implementation details.
10036	WARN	(Server Leaks Version Information via "Server" HTTP Response Header Field)
10023	FAIL	(Information Disclosure - Debug Error Messages)

# Session cookies, when present, must carry browser-safe flags.
10010	FAIL	(Cookie No HttpOnly Flag)
10011	FAIL	(Cookie Without Secure Flag)
10054	WARN	(Cookie without SameSite Attribute)

# HTML documents now ship clickjacking + feature-policy headers; keep these
# failing so the authed write UI cannot regress into a framable page. Raw
# REST/GraphQL routes are JSON and unaffected by frame headers.
10020	FAIL	(X-Frame-Options Header Not Set)
10063	FAIL	(Permissions Policy Header Not Set)
