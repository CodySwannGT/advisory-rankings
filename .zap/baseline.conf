# OWASP ZAP Baseline Scan Configuration - Harper Fabric apps
# Format: <rule_id> <action> <description>
# Actions: IGNORE (skip rule), WARN (report but do not fail), FAIL (fail on finding)

# The fastify static/shell layer emits these HTML-document headers
# (harper-app/seo_shell.js + static-web/index.js) on the deployed Fabric
# node. But this ZAP baseline scans a LOCAL `harperdb` build, where Harper's
# built-in `static` extension serves web/** and bypasses the fastify header
# layer — so the headers are absent under local scan even though they ship on
# Fabric. Keep these at WARN until local serving is header-consistent: FAIL
# here is a permanent false-red that would mask real regressions. Do not
# promote to FAIL until a local scan actually observes the headers on `/`.
10035	WARN	(Strict-Transport-Security Header Not Set)
10021	WARN	(X-Content-Type-Options Header Missing)
10038	WARN	(Content Security Policy (CSP) Header Not Set)
90004	WARN	(Cross-Origin-Resource-Policy Header Missing or Invalid)

# Static/browser surfaces should not disclose implementation details.
10036	WARN	(Server Leaks Version Information via "Server" HTTP Response Header Field)
10023	FAIL	(Information Disclosure - Debug Error Messages)

# Session cookies, when present, must carry browser-safe flags.
10010	FAIL	(Cookie No HttpOnly Flag)
10011	FAIL	(Cookie Without Secure Flag)
10054	WARN	(Cookie without SameSite Attribute)

# Clickjacking + feature-policy headers ship from the Fabric fastify layer
# but, like the transport headers above, are not observed by the LOCAL static
# scan. WARN until local serving is header-consistent.
10020	WARN	(X-Frame-Options Header Not Set)
10063	WARN	(Permissions Policy Header Not Set)
