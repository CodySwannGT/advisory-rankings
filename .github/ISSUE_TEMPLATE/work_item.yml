name: Implementation Task
description: Create a GitHub tracker task for implementation work.
title: '[Task] '
labels:
  - type:Task
  - status:ready
  - priority:medium
body:
  - type: markdown
    attributes:
      value: |
        Use this for build-ready single-repo tasks. PRDs should use the Product Requirement template and `prd-*` labels instead. Lisa-generated epics, stories, bugs, spikes, and improvements should apply their matching `type:*` labels when created.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
        - critical
      default: 1
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context / Business Value
      description: Explain why this work matters and link the originating PRD, incident, or request.
    validations:
      required: true
  - type: textarea
    id: technical_approach
    attributes:
      label: Technical Approach
      description: Note affected modules, data model implications, tradeoffs, and constraints.
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Use independently verifiable Given/When/Then scenarios.
      placeholder: |
        Scenario: ...
          Given ...
          When ...
          Then ...
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: List work that this issue deliberately does not cover.
    validations:
      required: true
  - type: input
    id: target_environment
    attributes:
      label: Target Backend Environment
      description: Required for runtime behavior changes; use dev, staging, or prod.
      placeholder: dev
    validations:
      required: false
  - type: input
    id: repository
    attributes:
      label: Repository
      description: Required for Bug, Task, and Sub-task issues.
      placeholder: advisory-rankings
    validations:
      required: false
  - type: textarea
    id: source_artifacts
    attributes:
      label: Source Artifacts / Links
      description: Link PRDs, designs, prototypes, dashboards, PRs, related issues, or data samples.
    validations:
      required: false
  - type: textarea
    id: validation_journey
    attributes:
      label: Validation Journey
      description: Describe user-like verification steps for runtime behavior changes.
      placeholder: |
        1. ...
        2. ...
        Expected: ...
    validations:
      required: false
