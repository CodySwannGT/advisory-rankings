name: Probe 9925 reachability

on:
  workflow_dispatch:
  push:
    branches:
      - claude/xenodochial-villani-f7f9b3

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe direct ops port from a GitHub-hosted runner
        run: |
          set +e
          echo "=== TCP/HTTPS connect to :9925 ==="
          curl -sS -o /dev/null -w "connect_http=%{http_code} time=%{time_total}s\n" \
            --max-time 25 https://advisory-rankings-de.cody-swann-org.harperfabric.com:9925/
          echo "exit=$?"
          echo "=== :443 control (known-reachable) ==="
          curl -sS -o /dev/null -w "feed_http=%{http_code} time=%{time_total}s\n" \
            --max-time 25 https://advisory-rankings-de.cody-swann-org.harperfabric.com/Feed
          echo "exit=$?"
