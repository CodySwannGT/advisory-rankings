name: Add Harper Fabric deploy key

on:
  push:
    paths:
      - .github/workflows/add-fabric-deploy-key.yml
      - .github/fabric-deploy-key.pub
  workflow_dispatch:

permissions:
  administration: write
  contents: write

jobs:
  add-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Try to add deploy key and capture result
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          KEY=$(cat .github/fabric-deploy-key.pub)
          TITLE='Harper Fabric (advisory-rankings-dev)'

          mkdir -p .github/_debug
          {
            echo "=== run started: $(date -u +%FT%TZ) ==="
            echo "=== GET /repos/.../keys ==="
            gh api "repos/${{ github.repository }}/keys" 2>&1
            echo "=== POST /repos/.../keys ==="
            gh api --method POST "repos/${{ github.repository }}/keys" \
              -f title="$TITLE" \
              -f key="$KEY" \
              -F read_only=true 2>&1
            echo "=== GET /repos/.../keys (after) ==="
            gh api "repos/${{ github.repository }}/keys" 2>&1
            echo "=== run done ==="
          } > .github/_debug/deploy-key-result.txt 2>&1
          cat .github/_debug/deploy-key-result.txt
      - name: Commit debug result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .github/_debug/deploy-key-result.txt
          git commit -m 'ci: capture deploy-key API result' || echo 'nothing to commit'
          git push origin main
