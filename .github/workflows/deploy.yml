name: Release and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'main'
        type: choice
        options:
          - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  determine_environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Release
    needs: [determine_environment]
    uses: CodySwannGT/lisa/.github/workflows/release.yml@main
    with:
      environment: ${{ needs.determine_environment.outputs.environment }}
      release_strategy: 'standard-version'
      skip_jobs: 'test:e2e,test:integration'
      require_approval: false
      require_signatures: false
      generate_sbom: true
      override_blackout: true
      node_version: '22.21.1'
      package_manager: 'bun'
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
      SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
      SIGNING_KEY_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

  deploy_fabric:
    name: Deploy to Fabric
    runs-on: ubuntu-latest
    needs: [determine_environment, release]
    if: needs.release.result == 'success'
    timeout-minutes: 15
    env:
      HARPER_STUDIO_URL: https://fabric.harper.fast
      HARPER_CLUSTER_URL: https://advisory-rankings-de.cody-swann-org.harperfabric.com
      HARPER_CLUSTER_ID: clu-nzeaqmqh1c5zrp9w
      HARPER_ADMIN_USERNAME: ${{ secrets.HARPER_ADMIN_USERNAME }}
      HARPER_ADMIN_PASSWORD: ${{ secrets.HARPER_ADMIN_PASSWORD }}
    steps:
      - name: Checkout released branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Verify required secrets are wired
        run: |
          if [ -z "${HARPER_ADMIN_USERNAME}" ] || [ -z "${HARPER_ADMIN_PASSWORD}" ]; then
            echo "::error::HARPER_ADMIN_USERNAME / HARPER_ADMIN_PASSWORD secrets are not set on the repo." >&2
            exit 1
          fi

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Build and deploy harper-app to Fabric
        run: bun run deploy

      - name: Install Playwright Chromium browser
        run: bunx playwright install --with-deps chromium

      - name: Smoke-test the deployed UI
        env:
          BASE_URL: ${{ env.HARPER_CLUSTER_URL }}
        run: bun run smoke

      - name: Upload smoke screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: tests/screenshots/
          if-no-files-found: ignore

      - name: Report deployed version
        run: echo "Deployed version ${{ needs.release.outputs.version }} to ${{ needs.determine_environment.outputs.environment }}"
