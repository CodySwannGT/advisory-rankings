name: Quality Checks

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version to use'
        required: false
        default: '22.21.1'
        type: string
      package_manager:
        description: 'Package manager to use'
        required: false
        default: 'bun'
        type: string
      skip_jobs:
        description: 'Comma-separated jobs to skip'
        required: false
        default: ''
        type: string

jobs:
  quality:
    name: Quality Checks
    uses: CodySwannGT/lisa/.github/workflows/quality.yml@main
    with:
      node_version: ${{ inputs.node_version }}
      package_manager: ${{ inputs.package_manager }}
      skip_jobs: ${{ inputs.skip_jobs }}
    secrets: inherit
