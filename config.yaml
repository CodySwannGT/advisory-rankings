# Harper component config — declares this directory as a Harper application.
# Docs: https://docs.harperdb.io/docs/developers/components

graphqlSchema:
  files: '*.graphql'

rest: true

# Static UI under web/ — served at the cluster's app URL root.
# REST routes (/Firm/, /Advisor/…) live under capitalized table names
# so they don't collide with the lowercase static asset paths.
static:
  files: 'web/*'
