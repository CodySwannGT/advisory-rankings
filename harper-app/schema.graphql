# Advisor data — Harper schema (v0.1)
#
# Implements the core entities from docs/advisor-schema.md, in a form
# Harper's GraphQL SDL can express.
#
# Caveats vs. the Postgres design in docs/data-model-decisions.md:
#   - Harper doesn't enforce foreign keys, CHECK constraints, partial unique
#     indexes, or triggers. Those guarantees move to the application layer.
#   - Polymorphic subjects (TransitionEvent / RankingEntry) and per-target
#     mention tables stay as nullable scalar IDs here; the CHECK
#     "exactly one of advisor_id/team_id/firm_id" is enforced in code.
#   - Snapshots-only metric tables: we still use them, but the
#     "current metrics" view is a query at read time.
#   - Bitemporal validity (effective_from/effective_to) is just two date
#     columns; uniqueness of "current" is enforced in code.
#
# Directives used:
#   @table         — declare as a table
#   @export        — expose via REST under /<TableName>
#   @primaryKey    — PK column
#   @indexed       — secondary index
#   @createdTime   — auto-managed insert timestamp
#   @updatedTime   — auto-managed update timestamp

# ─── FIRMS ─────────────────────────────────────────────────────────

type Firm @table @export {
  id: ID @primaryKey
  name: String! @indexed
  legalName: String
  parentFirmId: ID @indexed
  channel: String! @indexed # wirehouse, regional_bd, pure_ria, etc.
  subChannel: String # FiNet, LPL_Strategic_Wealth, etc.
  finraCrd: String @indexed
  secFilerId: String @indexed
  foundedYear: Int
  dissolvedYear: Int
  dissolutionReason: String # acquired, merged, seized, bankruptcy, ...
  hqCity: String
  hqState: String
  hqCountry: String
  isAggregator: Boolean
  notes: String
  website: String
  logoUrl: String
  createdAt: Date @createdTime
  updatedAt: Date @updatedTime
}

type FirmAlias @table @export {
  id: ID @primaryKey
  firmId: ID! @indexed
  alias: String! @indexed
  normalizedAlias: String! @indexed
  sourceType: String @indexed # curated, brokercheck, advisorhub_article, ...
  sourceRef: String
  confidence: String @indexed # approved, candidate
  createdAt: Date @createdTime
  updatedAt: Date @updatedTime
}

type FirmMergeAudit @table @export {
  id: ID @primaryKey
  oldFirmId: ID! @indexed
  canonicalFirmId: ID! @indexed
  oldName: String
  canonicalName: String
  reason: String @indexed
  mergedPayload: String
  createdAt: Date @createdTime
}

type FirmSuccession @table @export {
  id: ID @primaryKey
  predecessorFirmId: ID! @indexed
  successorFirmId: ID! @indexed
  successionDate: Date
  successionType: String # acquired, merged, seized, spun_off, wound_down
  transferredAssetsPct: Float
  transferredAdvisorsPct: Float
  notes: String
  createdAt: Date @createdTime
}

