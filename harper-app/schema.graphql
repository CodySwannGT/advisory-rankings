# BrokerCheck snapshots: one row per (CRD, fetch) so the UI can show
# "as of <date>" per the FINRA BrokerCheck Terms of Use, and the
# scraper can decide whether to re-fetch. Idempotent on `id`, which
# is derived as uuid5(NS, "bcsnap:<kind>:<crd>") — re-fetching the
# same CRD updates `fetchedAt` and `rawHash` rather than inserting.
type BrokerCheckSnapshot @table @export {
  id: ID @primaryKey
  subjectKind: String! @indexed # individual | firm
  subjectCrd: String! @indexed # FINRA CRD (or firmId for firms)
  subjectAdvisorId: ID @indexed # resolved when subjectKind=individual
  subjectFirmId: ID @indexed # resolved when subjectKind=firm
  fetchedAt: Date! @indexed
  bcScope: String # ACTIVE / InActive / NotInScope
  iaScope: String
  disclosureCount: Int
  employmentCount: Int
  examCount: Int
  registeredStateCount: Int
  rawHash: String # sha256 of the normalized response
  rawJson: String # the raw response, JSON-encoded
  createdAt: Date @createdTime
  updatedAt: Date @updatedTime
}

# Append-only provenance log: one row per fact asserted by an article.
type FieldAssertion @table @export @sealed {
  id: ID @primaryKey
  articleId: ID! @indexed
  targetTable: String! @indexed
  targetId: ID! @indexed
  fieldName: String! @indexed
  assertedValue: String # JSON-encoded
  quotePhrase: String
  confidence: String # asserted, inferred, derived
  assertedAt: Date @createdTime
}

# Tracks bounded, resumable source checks that do not map cleanly to a
# source-native snapshot table. The first use is scheduled web research
# for advisor bios, designations, team pages, rankings, and press.
type AdvisorResearchCheck @table @export {
  id: ID @primaryKey
  advisorId: ID! @indexed
  sourceType: String! @indexed # web_research, firm_bio, rankings, press
  checkedAt: Date! @indexed
  status: String! @indexed # success, no_new_data, ambiguous, failed
  sourcesChecked: [String]
  notes: String
  nextCheckAfter: Date @indexed
  createdAt: Date @createdTime
  updatedAt: Date @updatedTime
}

# ─── USER LAYER ────────────────────────────────────────────────────
#
# These tables hold per-user PRIVATE data (watchlist notes, private
# ratings). Raw table routes must not be granted to regular app users because
# Harper's table-level RBAC is not row-scoped — any role with table read could
# enumerate EVERY user's private rows. Access goes through the scoped resources
# (`AdvisorRating`, `UserWatchlists`), which run with elevated context and
# enforce per-user ownership in code.

type User @table {
  id: ID @primaryKey
  email: String! @indexed
  displayName: String
  createdAt: Date @createdTime
}

type UserRating @table {
  id: ID @primaryKey
  advisorId: ID! @indexed
  userId: ID! @indexed
  ratingInt: Int
  responsiveness: Int
  transparency: Int
  performance: Int
  planningDepth: Int
  reviewText: String
  createdAt: Date @createdTime
}

type AdvisorCorrectionRequest @table {
  id: ID @primaryKey
  advisorId: ID! @indexed
  fieldName: String! @indexed
  displayedValue: String
  proposedValue: String!
  submitterId: ID! @indexed
  submitterNote: String
  sourceType: String @indexed
  sourceRef: String
  sourceContext: String
  status: String! @indexed
  reviewerId: ID @indexed
  reviewerNote: String
  reviewedAt: Date
  createdAt: Date @createdTime
  updatedAt: Date @updatedTime
}

# The active watchlist resource (`UserWatchlists`) stores rows in
# `UserWatchlist`/`UserWatchlistEntry`, resolved through the `tables` global.
# These are per-user PRIVATE tables, so like `User`/`UserRating` they are
# `@table` WITHOUT `@export`: Harper's table-level RBAC is not row-scoped, and
# auto-generating raw `/UserWatchlist/` + `/UserWatchlistEntry/` REST routes
# would let any authenticated role with table read enumerate every user's
# private watchlist rows. (PR #1005 added `@export` as a failed workaround for a
# resource-binding bug; PR #1020 fixed the real cause — the `isSearchableTable`
# guard rejected Harper's function-typed table handles — so binding now works
# without `@export`.) The legacy `UserList`/`UserListEntry` tables from a
# reverted rename were dropped from the dev cluster and removed here.
type UserWatchlist @table {
  id: ID @primaryKey
  userId: ID! @indexed
  name: String!
  createdAt: Date @createdTime
}

type UserWatchlistEntry @table {
  id: ID @primaryKey
  listId: ID! @indexed
  advisorId: ID! @indexed
  rank: Int
  note: String
}
