<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Teams — AdvisorBook</title>
	<link rel="stylesheet" href="/app.css?v=20260521-media" />
</head>
<body>
	<script type="module">
		// Directory page: every team in the DB. UI from the design system.
		import { api, refreshMe, logout, search, humanize, initials, entityPath } from '/app.js?v=20260521-media';
		import {
			mountFullWidthPage, SectionCard, EmptyCard,
			EntityList, EntityRow,
		} from '/design-system/index.js?v=20260521-media';

		mountFullWidthPage({
			active: 'teams',
			refreshMe,
			logout,
			search,
			build({ center }) {
				api('/PublicTeams').then((teams) => {
					center.appendChild(SectionCard({
						title: `All teams (${teams.length})`,
						body: EntityList({
							rows: teams.map((t) => EntityRow({
								avatar: initials(t.name),
								name: t.name,
								sub: [t.currentFirmName, humanize(t.serviceModel)].filter(Boolean).join(' · '),
								href: entityPath('team', t),
							})),
						}),
					}));
				}).catch((err) => {
					center.appendChild(EmptyCard({ title: 'Could not load teams', body: String(err.message || err) }));
				});
			},
		});
	</script>
</body>
</html>
