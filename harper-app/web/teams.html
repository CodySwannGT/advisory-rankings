<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teams — AdvisorBook</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <!-- ab-boot-guard:start (identical across all web shells — see docs/fabric-runbook.md §6) -->
	<script>
		// Boot resilience. The shared Fabric dev serving node intermittently
		// resets connections during the browser's concurrent ES-module fan-out,
		// which aborts SPA boot and leaves a blank 200 page (and repeatedly broke
		// the deploy smoke gate). Recover by reloading while the page is still
		// unbooted, bounded per-path so a genuinely broken build can't reload-loop.
		// `.nav` / `.route-loading-feedback` render within ~1s of the entry module
		// executing, so their absence is a reliable "modules never loaded" signal
		// independent of backend latency.
		(() => {
			const READY = ".nav, .ab-page-title, article.card, .route-loading-feedback";
			const KEY = "ab-boot-retry:" + location.pathname;
			const MAX_RELOADS = 5;
			const state = { handled: false };
			const attempts = () => {
				try {
					return parseInt(sessionStorage.getItem(KEY) || "0", 10) || 0;
				} catch (_) {
					return MAX_RELOADS;
				}
			};
			const clearAttempts = () => {
				try {
					sessionStorage.removeItem(KEY);
				} catch (_) {}
			};
			const manualFallback = () => {
				if (document.querySelector(READY)) return;
				document.body.innerHTML =
					'<main class="layout" style="max-width:760px;margin:48px auto;padding:0 20px">' +
					'<section class="center card"><h1>AdvisorBook</h1>' +
					'<p>AdvisorBook could not finish loading this page.</p>' +
					'<button type="button" id="ab-reload">Reload</button></section></main>';
				const btn = document.getElementById("ab-reload");
				if (btn)
					btn.addEventListener("click", () => {
						clearAttempts();
						location.reload();
					});
			};
			const recover = () => {
				if (state.handled || document.querySelector(READY)) return;
				const n = attempts();
				if (n >= MAX_RELOADS) {
					manualFallback();
					return;
				}
				state.handled = true;
				try {
					sessionStorage.setItem(KEY, String(n + 1));
				} catch (_) {}
				location.reload();
			};
			window.addEventListener(
				"error",
				event => {
					const t = event.target;
					if (t instanceof HTMLScriptElement || t instanceof HTMLLinkElement)
						recover();
				},
				true
			);
			window.addEventListener("unhandledrejection", recover);
			// Clear the per-path budget once the app actually renders.
			window.setTimeout(() => {
				if (document.querySelector(READY)) clearAttempts();
			}, 2000);
			// Auto-reload (bounded) if nothing rendered within the boot window.
			window.setTimeout(recover, 5000);
		})();
	</script>
	<!-- ab-boot-guard:end -->
    <script type="module">
      // Directory page: cursor-paginated team rows. UI from the design system.
      import {
        api,
        refreshMe,
        logout,
        search,
        humanize,
        initials,
        entityPath,
        clear,
      } from "/app.js";
      import {
        mountThreeColumnPage,
        SectionCard,
        AsyncStateCard,
        DetailsCard,
        EntityRow,
        Paginated,
        el,
      } from "/design-system/index.js";

      const PAGE_SIZE = 50;
      const SERVICE_MODEL_OPTIONS = [
        ["", "Any service model"],
        ["uhnw", "Ultra-high-net-worth"],
        ["hnw", "High-net-worth"],
      ];

      mountThreeColumnPage({
        active: "teams",
        refreshMe,
        logout,
        search,
        pageTitle: "Team directory",
        build({ center, right }) {
          const loadTeams = () => {
            const filters = readTeamFilters();
            clear(center);
            clear(right);
            let totalCount = null;
            let statsCard = DetailsCard({
              title: "Team directory",
              pairs: [
                ["Showing", "0 teams"],
                ["Matches", "Finding teams..."],
              ],
            });
            right.appendChild(statsCard);
            const loaded = new Set();
            const updateStats = total => {
              if (typeof total === "number") totalCount = total;
              const nextStatsCard = DetailsCard({
                title: "Team directory",
                pairs: [
                  ["Showing", `${loaded.size.toLocaleString()} teams`],
                  [
                    "Matches",
                    typeof totalCount === "number"
                      ? `${totalCount.toLocaleString()} matching teams`
                      : "Finding teams...",
                  ],
                ],
              });
              statsCard.replaceWith(nextStatsCard);
              statsCard = nextStatsCard;
            };

            try {
              center.appendChild(
                SectionCard({
                  title: activeFilterTitle("All teams", filters),
                  body: [
                    teamFilterForm(filters),
                    Paginated({
                      fetchPage: cursor => {
                        const qs = directoryQuery(filters, cursor);
                        return api(`/PublicTeams?${qs.toString()}`);
                      },
                      firstPageLoadingLabel: "Loading teams…",
                      renderRow: t => {
                        loaded.add(t.id);
                        updateStats();
                        return EntityRow({
                          avatar: initials(t.name),
                          name: t.name,
                          sub: [t.currentFirmName, humanize(t.serviceModel)]
                            .filter(Boolean)
                            .join(" · "),
                          href: entityPath("team", t),
                        });
                      },
                      empty: teamEmptyCopy(filters),
                      onTotal: updateStats,
                    }),
                  ],
                })
              );
            } catch (err) {
              console.error("Team directory failed to load", err);
              center.appendChild(
                AsyncStateCard({
                  kind: "transient",
                  title: "Could not load teams",
                  body: "Retry the request to refresh this directory.",
                  actionLabel: "Retry",
                  onAction: loadTeams,
                })
              );
            }
          };
          window.addEventListener("popstate", loadTeams);
          loadTeams();
        },
      });

      function readTeamFilters() {
        const params = new URLSearchParams(location.search);
        return {
          q: clean(params.get("q")),
          firm: clean(params.get("firm")),
          serviceModel: clean(params.get("serviceModel")),
        };
      }

      function teamFilterForm(filters) {
        const basePath = currentDirectoryPath("/teams");
        const clearAction = activeFilters(filters)
          ? el(
              "a",
              {
                class: "feed-filter-clear",
                href: basePath,
              },
              "Clear"
            )
          : null;
        const form = el(
          "form",
          { class: "directory-filters", method: "get", action: basePath },
          typeaheadField("Team", "q", filters.q, "Team name", "team"),
          typeaheadField(
            "Current firm",
            "firm",
            filters.firm,
            "Firm name",
            "firm"
          ),
          selectField(
            "Service model",
            "serviceModel",
            filters.serviceModel,
            SERVICE_MODEL_OPTIONS
          ),
          clearAction
        );
        installLiveFilters(form, basePath);
        installTypeahead(form, "q", "team");
        installTypeahead(form, "firm", "firm");
        return form;
      }

      function directoryQuery(filters, cursor) {
        const qs = new URLSearchParams({ limit: String(PAGE_SIZE) });
        for (const [key, value] of Object.entries(filters)) {
          if (value) qs.set(key, value);
        }
        if (cursor) qs.set("cursor", cursor);
        return qs;
      }

      function textField(label, name, value, placeholder) {
        const id = `team-filter-${name}`;
        return el(
          "div",
          { class: "filter-field" },
          el("label", { for: id }, label),
          el("input", { id, name, value, placeholder })
        );
      }

      function typeaheadField(label, name, value, placeholder, kind) {
        const id = `team-filter-${name}`;
        const listId = `${id}-suggestions`;
        return el(
          "div",
          { class: "filter-field" },
          el("label", { for: id }, label),
          el("input", {
            id,
            name,
            value,
            placeholder,
            list: listId,
            autocomplete: "off",
            "data-search-kind": kind,
          }),
          el("datalist", { id: listId })
        );
      }

      function selectField(label, name, value, options) {
        const id = `team-filter-${name}`;
        const normalizedOptions = options.some(([optionValue]) => optionValue === value)
          ? options
          : [[value, value], ...options];
        return el(
          "div",
          { class: "filter-field" },
          el("label", { for: id }, label),
          el(
            "select",
            { id, name },
            ...normalizedOptions.map(([optionValue, optionLabel]) =>
              el(
                "option",
                { value: optionValue, selected: optionValue === value },
                optionLabel
              )
            )
          )
        );
      }

      function clean(value) {
        return String(value || "").trim();
      }

      function currentDirectoryPath(fallback) {
        return location.pathname || fallback;
      }

      function activeFilters(filters) {
        return Object.values(filters).some(Boolean);
      }

      function activeFilterTitle(title, filters) {
        return activeFilters(filters) ? `${title} (filtered)` : title;
      }

      function filterEmptyCopy(filters, filteredCopy, defaultCopy) {
        return activeFilters(filters) ? filteredCopy : defaultCopy;
      }

      function teamEmptyCopy(filters) {
        if (filters.serviceModel && !filters.q && !filters.firm) {
          return "No current public teams have that service model.";
        }
        return filterEmptyCopy(
          filters,
          "No teams match the selected filters.",
          "No teams are available yet."
        );
      }

      function installLiveFilters(form, path) {
        let timer = null;
        const apply = () => {
          const qs = compactFormParams(form).toString();
          history.pushState(null, "", qs ? `${path}?${qs}` : path);
          window.dispatchEvent(new PopStateEvent("popstate"));
        };
        const schedule = () => {
          clearTimeout(timer);
          timer = setTimeout(apply, 250);
        };
        form.addEventListener("submit", event => {
          event.preventDefault();
          apply();
        });
        form.querySelectorAll("input").forEach(input => {
          input.addEventListener("input", schedule);
        });
        form.querySelectorAll("select").forEach(select => {
          select.addEventListener("change", apply);
        });
      }

      function installTypeahead(form, name, kind) {
        const input = form.querySelector(`[name="${name}"]`);
        const list = input?.list;
        if (!input || !list) return;
        let timer = null;
        let requestId = 0;
        input.addEventListener("input", () => {
          clearTimeout(timer);
          requestId += 1;
          const currentRequestId = requestId;
          const q = input.value.trim();
          if (q.length < 2) {
            list.replaceChildren();
            return;
          }
          timer = setTimeout(async () => {
            const result = await search(q, kind).catch(() => null);
            if (currentRequestId !== requestId) return;
            const options = (result?.items || [])
              .slice(0, 8)
              .map(item => el("option", { value: item.name }));
            list.replaceChildren(...options);
          }, 150);
        });
      }

      function compactFormParams(form) {
        const qs = new URLSearchParams();
        for (const [key, value] of new FormData(form)) {
          const cleanValue = String(value || "").trim();
          if (cleanValue) qs.set(key, cleanValue);
        }
        return qs;
      }
    </script>
  </body>
</html>
