<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teams — AdvisorBook</title>
    <link rel="stylesheet" href="/app.css?v=20260521-media" />
  </head>
  <body>
    <script type="module">
      // Directory page: cursor-paginated team rows. UI from the design system.
      import {
        api,
        refreshMe,
        logout,
        search,
        humanize,
        initials,
        entityPath,
        clear,
      } from "/app.js?v=20260521-media";
      import {
        mountThreeColumnPage,
        SectionCard,
        AsyncStateCard,
        DetailsCard,
        EntityRow,
        Paginated,
      } from "/design-system/index.js?v=20260521-media";

      const PAGE_SIZE = 50;

      mountThreeColumnPage({
        active: "teams",
        refreshMe,
        logout,
        search,
        pageTitle: "Team directory",
        build({ center, right }) {
          const loadTeams = () => {
            clear(center);
            clear(right);
            let totalCount = null;
            let statsCard = DetailsCard({
              title: "Team directory",
              pairs: [
                ["Loaded", "0"],
                ["Total", "Loading..."],
              ],
            });
            right.appendChild(statsCard);
            const loaded = new Set();
            const updateStats = total => {
              if (typeof total === "number") totalCount = total;
              const nextStatsCard = DetailsCard({
                title: "Team directory",
                pairs: [
                  ["Loaded", loaded.size.toLocaleString()],
                  [
                    "Total",
                    typeof totalCount === "number"
                      ? totalCount.toLocaleString()
                      : "Loading...",
                  ],
                ],
              });
              statsCard.replaceWith(nextStatsCard);
              statsCard = nextStatsCard;
            };

            try {
              center.appendChild(
                SectionCard({
                  title: "All teams",
                  body: Paginated({
                    fetchPage: cursor => {
                      const qs = new URLSearchParams({
                        limit: String(PAGE_SIZE),
                      });
                      if (cursor) qs.set("cursor", cursor);
                      return api(`/PublicTeams?${qs.toString()}`);
                    },
                    renderRow: t => {
                      loaded.add(t.id);
                      updateStats();
                      return EntityRow({
                        avatar: initials(t.name),
                        name: t.name,
                        sub: [t.currentFirmName, humanize(t.serviceModel)]
                          .filter(Boolean)
                          .join(" · "),
                        href: entityPath("team", t),
                      });
                    },
                    empty: "No teams are available yet.",
                    onTotal: updateStats,
                  }),
                })
              );
            } catch (err) {
              console.error("Team directory failed to load", err);
              center.appendChild(
                AsyncStateCard({
                  kind: "transient",
                  title: "Could not load teams",
                  body: "Retry the request to refresh this directory.",
                  actionLabel: "Retry",
                  onAction: loadTeams,
                })
              );
            }
          };
          loadTeams();
        },
      });
    </script>
  </body>
</html>
