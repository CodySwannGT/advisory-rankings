<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Teams — AdvisoryRankings</title>
	<link rel="stylesheet" href="app.css" />
</head>
<body>
	<script type="module">
		import { api, el, mountPage, initials } from './app.js';
		mountPage({
			active: 'teams',
			build(layout) {
				const center = el('section', { class: 'center', style: 'grid-column: 1 / -1;' });
				layout.appendChild(center);
				Promise.all([api('/Team/'), api('/Firm/')]).then(([teams, firms]) => {
					const firmById = new Map(firms.map((f) => [f.id, f]));
					teams.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
					center.appendChild(el('div', { class: 'card' },
						el('div', { class: 'card-body' },
							el('h2', { class: 'card-title' }, `All teams (${teams.length})`),
							el('div', { class: 'entity-list' },
								...teams.map((t) => {
									const firm = t.currentFirmId ? firmById.get(t.currentFirmId) : null;
									return el('a', { href: `team.html?id=${encodeURIComponent(t.id)}`, style: 'text-decoration:none;color:inherit;' },
										el('div', { class: 'row' },
											el('div', { class: 'avatar' }, initials(t.name)),
											el('div', { class: 'body' },
												el('div', { class: 'name' }, t.name),
												el('div', { class: 'sub' }, [
													firm?.name,
													t.serviceModel,
												].filter(Boolean).join(' · ')),
											),
										));
								}),
							),
						),
					));
				}).catch((err) => {
					center.appendChild(el('div', { class: 'card' },
						el('div', { class: 'card-body' },
							el('h2', { class: 'card-title' }, 'Could not load teams'),
							el('div', { class: 'empty' }, String(err.message || err)))));
				});
			},
		});
	</script>
</body>
</html>
