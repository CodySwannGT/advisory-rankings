<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Advisors — AdvisorBook</title>
	<link rel="stylesheet" href="/app.css" />
</head>
<body>
	<script type="module">
		// Directory page: every advisor in the DB, paginated.
		// `/PublicAdvisors` is cursor-paginated server-side; the
		// Paginated organism handles infinite-scroll + Load-more UI.
		import { api, refreshMe, logout, search, humanize, initials } from '/app.js';
		import { advisorPath } from '/router.js';
		import {
			mountFullWidthPage, SectionCard,
			Paginated, EntityRow,
		} from '/design-system/index.js';

		mountFullWidthPage({
			active: 'advisors',
			refreshMe,
			logout,
			search,
			build({ center }) {
				const card = SectionCard({
					title: 'All advisors',
					body: Paginated({
						fetchPage: async (cursor) => {
							const qs = new URLSearchParams({ limit: '50' });
							if (cursor) qs.set('cursor', cursor);
							return api(`/PublicAdvisors?${qs}`);
						},
						empty: 'No advisors on file.',
						onTotal: (n) => {
							const titleEl = card.querySelector('h2.card-title');
							if (titleEl) titleEl.textContent = `All advisors (${n})`;
						},
						renderRow: (a) => {
							const last = a.lastName || '';
							const pref = a.preferredName;
							const name = pref
								? (last && pref.toLowerCase().endsWith(last.toLowerCase())
									? pref
									: `${pref} ${last}`.trim())
								: (a.legalName || last || a.id);
							return EntityRow({
								avatar: initials(name),
								name,
								sub: [
									humanize(a.careerStatus),
									a.yearsExperience ? `${a.yearsExperience}y` : null,
									a.finraCrd ? `CRD ${a.finraCrd}` : null,
								].filter(Boolean).join(' · '),
								href: advisorPath(a),
							});
						},
					}),
				});
				center.appendChild(card);
			},
		});
	</script>
</body>
</html>
