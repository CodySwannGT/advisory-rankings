<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Advisors — AdvisorBook</title>
	<link rel="stylesheet" href="/app.css?v=20260521-media" />
</head>
<body>
	<script type="module">
		// Directory page: every advisor in the DB, paginated.
		// `/PublicAdvisors` is cursor-paginated server-side; the
		// Paginated organism handles infinite-scroll + Load-more UI.
		import { api, refreshMe, logout, search, humanize, initials, entityPath } from '/app.js?v=20260521-media';
		import {
			mountThreeColumnPage, SectionCard, DetailsCard,
			Paginated, EntityRow, Avatar,
		} from '/design-system/index.js?v=20260521-media';

		mountThreeColumnPage({
			active: 'advisors',
			refreshMe,
			logout,
			search,
			build({ center, right }) {
				let loaded = 0;
				const stats = DetailsCard({
					title: 'Advisor directory',
					pairs: [
						['Loaded', '0'],
						['Total', 'Loading…'],
						['Page size', '50'],
					],
				});
				right.appendChild(stats);
				const setStat = (label, value) => {
					const rows = [...stats.querySelectorAll('.kv-row')];
					const row = rows.find((r) => r.querySelector('.kv-key')?.textContent === label);
					const val = row?.querySelector('.kv-val');
					if (val) val.textContent = String(value);
				};
				const card = SectionCard({
					title: 'All advisors',
					body: Paginated({
						fetchPage: async (cursor) => {
							const qs = new URLSearchParams({ limit: '50' });
							if (cursor) qs.set('cursor', cursor);
							return api(`/PublicAdvisors?${qs}`);
						},
						empty: 'No advisors on file.',
						onTotal: (n) => {
							const titleEl = card.querySelector('h2.card-title');
							if (titleEl) titleEl.textContent = `All advisors (${n})`;
							setStat('Total', n);
						},
						renderRow: (a) => {
							const last = a.lastName || '';
							const pref = a.preferredName;
							const name = pref
								? (last && pref.toLowerCase().endsWith(last.toLowerCase())
									? pref
									: `${pref} ${last}`.trim())
								: (a.legalName || last || a.id);
							const row = EntityRow({
								avatar: Avatar({ initials: initials(name), imageUrl: a.headshotUrl, alt: name }),
								name,
								sub: [
									humanize(a.careerStatus),
									a.yearsExperience ? `${a.yearsExperience}y` : null,
									a.finraCrd ? `CRD ${a.finraCrd}` : null,
								].filter(Boolean).join(' · '),
								href: entityPath('advisor', { ...a, name }),
							});
							loaded += 1;
							setStat('Loaded', loaded);
							return row;
						},
					}),
				});
				center.appendChild(card);
			},
		});
	</script>
</body>
</html>
