<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advisors — AdvisorBook</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <!-- ab-boot-guard:start (identical across all web shells — see docs/fabric-runbook.md §6) -->
    <script>
    	// Boot resilience. The shared Fabric dev serving node intermittently
    	// resets connections during the browser's concurrent ES-module fan-out,
    	// which aborts SPA boot and leaves a blank 200 page (and repeatedly broke
    	// the deploy smoke gate). Recover by reloading while the page is still
    	// unbooted, bounded per-path so a genuinely broken build can't reload-loop.
    	// `.nav` / `.route-loading-feedback` render within ~1s of the entry module
    	// executing, so their absence is a reliable "modules never loaded" signal
    	// independent of backend latency.
    	(() => {
    		const READY = ".nav, .ab-page-title, article.card, .route-loading-feedback";
    		const KEY = "ab-boot-retry:" + location.pathname;
    		const MAX_RELOADS = 5;
    		const state = { handled: false };
    		const attempts = () => {
    			try {
    				return parseInt(sessionStorage.getItem(KEY) || "0", 10) || 0;
    			} catch (_) {
    				return MAX_RELOADS;
    			}
    		};
    		const clearAttempts = () => {
    			try {
    				sessionStorage.removeItem(KEY);
    			} catch (_) {}
    		};
    		const manualFallback = () => {
    			if (document.querySelector(READY)) return;
    			document.body.innerHTML =
    				'<main class="layout" style="max-width:760px;margin:48px auto;padding:0 20px">' +
    				'<section class="center card"><h1>AdvisorBook</h1>' +
    				'<p>AdvisorBook could not finish loading this page.</p>' +
    				'<button type="button" id="ab-reload">Reload</button></section></main>';
    			const btn = document.getElementById("ab-reload");
    			if (btn)
    				btn.addEventListener("click", () => {
    					clearAttempts();
    					location.reload();
    				});
    		};
    		const recover = () => {
    			if (state.handled || document.querySelector(READY)) return;
    			const n = attempts();
    			if (n >= MAX_RELOADS) {
    				manualFallback();
    				return;
    			}
    			state.handled = true;
    			try {
    				sessionStorage.setItem(KEY, String(n + 1));
    			} catch (_) {}
    			location.reload();
    		};
    		window.addEventListener(
    			"error",
    			event => {
    				const t = event.target;
    				if (t instanceof HTMLScriptElement || t instanceof HTMLLinkElement)
    					recover();
    			},
    			true
    		);
    		window.addEventListener("unhandledrejection", recover);
    		// Clear the per-path budget once the app actually renders.
    		window.setTimeout(() => {
    			if (document.querySelector(READY)) clearAttempts();
    		}, 2000);
    		// Auto-reload (bounded) if nothing rendered within the boot window.
    		window.setTimeout(recover, 5000);
    	})();
    </script>
    <!-- ab-boot-guard:end -->
    <script type="module">
      // Directory page: every advisor in the DB, paginated.
      // `/PublicAdvisors` is cursor-paginated server-side; the
      // Paginated organism handles infinite-scroll + Load-more UI.
      import {
        api,
        refreshMe,
        logout,
        search,
        humanize,
        initials,
        entityPath,
      } from "/app.js";
      import {
        mountThreeColumnPage,
        SectionCard,
        DetailsCard,
        Paginated,
        EntityRow,
        Avatar,
        Button,
        clear,
        el,
      } from "/design-system/index.js";
      import { compareEntryAction } from "/compare-entry.js";

      const PAGE_SIZE = "50";

      mountThreeColumnPage({
        active: "advisors",
        refreshMe,
        logout,
        search,
        pageTitle: "Advisor directory",
        build({ center, right }) {
          let loaded = 0;
          let activeFilters = readFilters();
          const stats = DetailsCard({
            title: "Advisor directory",
            pairs: [
              ["Showing", "0 advisors"],
              ["Matches", "Finding advisors..."],
            ],
          });
          right.appendChild(stats);
          const setStat = (label, value) => {
            const labels = [...stats.querySelectorAll("dt")];
            const key = labels.find(dt => dt.textContent === label);
            const val = key?.nextElementSibling;
            if (val)
              val.textContent = Number.isFinite(value)
                ? value.toLocaleString()
                : String(value);
          };
          const renderDirectory = () => {
            loaded = 0;
            activeFilters = readFilters();
            setStat("Showing", "0 advisors");
            setStat("Matches", "Finding advisors...");
            clear(center);
            center.appendChild(filterCard(activeFilters, renderDirectory));
            const card = SectionCard({
              title: activeFilters.active
                ? "Filtered advisors"
                : "All advisors",
              body: Paginated({
                fetchPage: async cursor => {
                  const qs = advisorQuery(activeFilters);
                  qs.set("limit", PAGE_SIZE);
                  if (cursor) qs.set("cursor", cursor);
                  return api(`/PublicAdvisors?${qs}`);
                },
                empty: activeFilters.active
                  ? "No advisors match these filters."
                  : "No advisors on file.",
                onTotal: n => {
                  const titleEl = card.querySelector("h2.card-title");
                  if (titleEl)
                    titleEl.textContent = `${activeFilters.active ? "Filtered advisors" : "All advisors"} (${n.toLocaleString()})`;
                  setStat("Matches", `${n.toLocaleString()} matching advisors`);
                },
                renderRow: a => {
                  const last = a.lastName || "";
                  const pref = a.preferredName;
                  const name = pref
                    ? last && pref.toLowerCase().endsWith(last.toLowerCase())
                      ? pref
                      : `${pref} ${last}`.trim()
                    : a.legalName || last || a.id;
                  const href = entityPath("advisor", { ...a, name });
                  const row = EntityRow({
                    avatar: Avatar({
                      initials: initials(name),
                      imageUrl: a.headshotUrl,
                      alt: name,
                    }),
                    name: el("a", { href, class: "directory-row-link" }, name),
                    sub: [
                      humanize(a.careerStatus),
                      a.yearsExperience ? `${a.yearsExperience}y` : null,
                      a.finraCrd ? `CRD ${a.finraCrd}` : null,
                    ]
                      .filter(Boolean)
                      .join(" · "),
                    tail: compareEntryAction({
                      advisorId: a.id,
                      label: "Compare",
                      className: "compare-entry-button--directory",
                    }),
                    attrs: { class: "advisor-directory-row" },
                  });
                  loaded += 1;
                  setStat("Showing", `${loaded.toLocaleString()} advisors`);
                  return row;
                },
              }),
            });
            center.appendChild(card);
          };
          window.addEventListener("popstate", renderDirectory);
          renderDirectory();
        },
      });

      function filterCard(filters, renderDirectory) {
        const form = document.createElement("form");
        form.className = "advisor-directory-filters";
        form.method = "get";
        form.action = "/advisors";
        form.append(
          filterInput("Advisor", "q", filters.q, "Name or keyword"),
          filterInput("Current firm", "firm", filters.firm, "Firm name", "firm"),
          filterSelect("Career status", "careerStatus", filters.careerStatus, [
            ["", "Any status"],
            ["active", "Active"],
            ["retired", "Retired"],
            ["inactive", "Inactive"],
            ["unknown", "Unknown"],
          ]),
          filterSelect("CRD", "hasCrd", filters.hasCrd, [
            ["", "Any CRD state"],
            ["true", "Has CRD"],
            ["false", "Missing CRD"],
          ]),
          clearFiltersButton(filters.active, renderDirectory)
        );
        installLiveFilters(form, "/advisors", renderDirectory);
        installTypeahead(form, "q", "advisor");
        installTypeahead(form, "firm", "firm");
        form.addEventListener("submit", event => {
          event.preventDefault();
          writeFilters(new FormData(form));
          renderDirectory();
        });
        return SectionCard({ title: "Filters", body: form });
      }

      function filterInput(label, name, value, placeholder, kind = "advisor") {
        const id = `advisor-filter-${name}`;
        const listId = `${id}-suggestions`;
        return el(
          "div",
          { class: "filter-field" },
          el("label", { for: id }, label),
          el("input", {
            id,
            name,
            value,
            placeholder,
            autocomplete: "off",
            list: listId,
            "data-search-kind": kind,
          }),
          el("datalist", { id: listId })
        );
      }

      function filterSelect(label, name, value, options) {
        const id = `advisor-filter-${name}`;
        return el(
          "div",
          { class: "filter-field" },
          el("label", { for: id }, label),
          el(
            "select",
            { id, name },
            ...options.map(([optionValue, optionLabel]) =>
              el(
                "option",
                { value: optionValue, selected: optionValue === value },
                optionLabel
              )
            )
          )
        );
      }

      function clearFiltersButton(active, renderDirectory) {
        return Button({
          variant: "neutral",
          children: "Clear",
          onClick: () => {
            history.pushState(null, "", "/advisors");
            renderDirectory();
          },
          attrs: {
            class: "feed-filter-clear",
            disabled: active ? null : "",
            type: "button",
          },
        });
      }

      function readFilters() {
        const params = new URLSearchParams(window.location.search);
        const filters = {
          q: params.get("q") || "",
          firm: params.get("firm") || "",
          careerStatus: params.get("careerStatus") || "",
          hasCrd: params.get("hasCrd") || "",
        };
        return { ...filters, active: [...advisorQuery(filters)].length > 0 };
      }

      function writeFilters(formData) {
        const filters = {
          q: String(formData.get("q") || "").trim(),
          firm: String(formData.get("firm") || "").trim(),
          careerStatus: String(formData.get("careerStatus") || "").trim(),
          hasCrd: String(formData.get("hasCrd") || "").trim(),
        };
        const qs = advisorQuery(filters).toString();
        history.pushState(null, "", qs ? `/advisors?${qs}` : "/advisors");
      }

      function advisorQuery(filters) {
        const qs = new URLSearchParams();
        for (const [key, value] of Object.entries(filters)) {
          if (key === "active" || !value) continue;
          qs.set(key, value);
        }
        return qs;
      }

      function installLiveFilters(form, path, renderDirectory) {
        let timer = null;
        const apply = () => {
          const qs = advisorQuery(Object.fromEntries(new FormData(form))).toString();
          history.pushState(null, "", qs ? `${path}?${qs}` : path);
          renderDirectory();
        };
        const schedule = () => {
          clearTimeout(timer);
          timer = setTimeout(apply, 250);
        };
        form.querySelectorAll("input").forEach(input => {
          input.addEventListener("input", schedule);
        });
        form.querySelectorAll("select").forEach(select => {
          select.addEventListener("change", apply);
        });
      }

      function installTypeahead(form, name, kind) {
        const input = form.querySelector(`[name="${name}"]`);
        const list = input?.list;
        if (!input || !list) return;
        let timer = null;
        input.addEventListener("input", () => {
          clearTimeout(timer);
          const q = input.value.trim();
          if (q.length < 2) {
            list.replaceChildren();
            return;
          }
          timer = setTimeout(async () => {
            const result = await search(q, kind).catch(() => null);
            const options = (result?.items || [])
              .slice(0, 8)
              .map(item => el("option", { value: item.name }));
            list.replaceChildren(...options);
          }, 150);
        });
      }
    </script>
  </body>
</html>
