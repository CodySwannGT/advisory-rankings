<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Advisors — AdvisorBook</title>
	<link rel="stylesheet" href="app.css" />
</head>
<body>
	<script type="module">
		// Directory page: every advisor in the DB. UI from the design system.
		import { api, refreshMe, logout, initials } from './app.js';
		import {
			mountFullWidthPage, SectionCard, EmptyCard,
			EntityList, EntityRow,
		} from './design-system/index.js';

		mountFullWidthPage({
			active: 'advisors',
			refreshMe,
			logout,
			build({ center }) {
				api('/PublicAdvisors').then((rows) => {
					center.appendChild(SectionCard({
						title: `All advisors (${rows.length})`,
						body: EntityList({
							rows: rows.map((a) => {
								const name = a.preferredName
									? `${a.preferredName} ${a.lastName || ''}`.trim()
									: (a.legalName || a.lastName || a.id);
								return EntityRow({
									avatar: initials(name),
									name,
									sub: [
										a.careerStatus,
										a.yearsExperience ? `${a.yearsExperience}y` : null,
										a.finraCrd ? `CRD ${a.finraCrd}` : null,
									].filter(Boolean).join(' · '),
									href: `advisor.html?id=${encodeURIComponent(a.id)}`,
								});
							}),
						}),
					}));
				}).catch((err) => {
					center.appendChild(EmptyCard({ title: 'Could not load advisors', body: String(err.message || err) }));
				});
			},
		});
	</script>
</body>
</html>
