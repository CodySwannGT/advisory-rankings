<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firms — AdvisorBook</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <!-- ab-boot-guard:start (identical across all web shells — see docs/fabric-runbook.md §6) -->
    <script>
    	// Boot resilience. The shared Fabric dev serving node intermittently
    	// resets connections during the browser's concurrent ES-module fan-out,
    	// which aborts SPA boot and leaves a blank 200 page (and repeatedly broke
    	// the deploy smoke gate). Recover by reloading while the page is still
    	// unbooted, bounded per-path so a genuinely broken build can't reload-loop.
    	// `.nav` / `.route-loading-feedback` render within ~1s of the entry module
    	// executing, so their absence is a reliable "modules never loaded" signal
    	// independent of backend latency.
    	(() => {
    		const READY = ".nav, .ab-page-title, article.card, .route-loading-feedback";
    		const KEY = "ab-boot-retry:" + location.pathname;
    		const MAX_RELOADS = 5;
    		const state = { handled: false };
    		const attempts = () => {
    			try {
    				return parseInt(sessionStorage.getItem(KEY) || "0", 10) || 0;
    			} catch (_) {
    				return MAX_RELOADS;
    			}
    		};
    		const clearAttempts = () => {
    			try {
    				sessionStorage.removeItem(KEY);
    			} catch (_) {}
    		};
    		const manualFallback = () => {
    			if (document.querySelector(READY)) return;
    			document.body.innerHTML =
    				'<main class="layout" style="max-width:760px;margin:48px auto;padding:0 20px">' +
    				'<section class="center card"><h1>AdvisorBook</h1>' +
    				'<p>AdvisorBook could not finish loading this page.</p>' +
    				'<button type="button" id="ab-reload">Reload</button></section></main>';
    			const btn = document.getElementById("ab-reload");
    			if (btn)
    				btn.addEventListener("click", () => {
    					clearAttempts();
    					location.reload();
    				});
    		};
    		const recover = () => {
    			if (state.handled || document.querySelector(READY)) return;
    			const n = attempts();
    			if (n >= MAX_RELOADS) {
    				manualFallback();
    				return;
    			}
    			state.handled = true;
    			try {
    				sessionStorage.setItem(KEY, String(n + 1));
    			} catch (_) {}
    			location.reload();
    		};
    		window.addEventListener(
    			"error",
    			event => {
    				const t = event.target;
    				if (t instanceof HTMLScriptElement || t instanceof HTMLLinkElement)
    					recover();
    			},
    			true
    		);
    		window.addEventListener("unhandledrejection", recover);
    		// Clear the per-path budget once the app actually renders.
    		window.setTimeout(() => {
    			if (document.querySelector(READY)) clearAttempts();
    		}, 2000);
    		// Auto-reload (bounded) if nothing rendered within the boot window.
    		window.setTimeout(recover, 5000);
    	})();
    </script>
    <!-- ab-boot-guard:end -->
    <script type="module">
      // Directory page: cursor-paginated firm rows. UI from the design system.
      import {
        api,
        refreshMe,
        logout,
        search,
        humanize,
        initials,
        entityPath,
        clear,
      } from "/app.js";
      import {
        mountThreeColumnPage,
        SectionCard,
        AsyncStateCard,
        DetailsCard,
        EntityRow,
        Avatar,
        Paginated,
        el,
      } from "/design-system/index.js";

      const PAGE_SIZE = 50;
      const ACTIVE_OPTIONS = [
        ["", "Any status"],
        ["true", "Active"],
        ["false", "Dissolved"],
      ];

      mountThreeColumnPage({
        active: "firms",
        refreshMe,
        logout,
        search,
        pageTitle: "Firm directory",
        build({ center, right }) {
          const filters = readFirmFilters();
          const loadFirms = () => {
            clear(center);
            clear(right);
            let totalCount = null;
            let statsCard = DetailsCard({
              title: "Firm directory",
              pairs: [
                ["Loaded", "0"],
                ["Total", "Loading..."],
              ],
            });
            right.appendChild(statsCard);
            const loaded = new Set();
            const updateStats = total => {
              if (typeof total === "number") totalCount = total;
              const nextStatsCard = DetailsCard({
                title: "Firm directory",
                pairs: [
                  ["Loaded", loaded.size.toLocaleString()],
                  [
                    "Total",
                    typeof totalCount === "number"
                      ? totalCount.toLocaleString()
                      : "Loading...",
                  ],
                ],
              });
              statsCard.replaceWith(nextStatsCard);
              statsCard = nextStatsCard;
            };

            try {
              center.appendChild(
                SectionCard({
                  title: activeFilterTitle("All firms", filters),
                  body: [
                    firmFilterForm(filters),
                    Paginated({
                      fetchPage: cursor => {
                        const qs = directoryQuery(filters, cursor);
                        return api(`/PublicFirms?${qs.toString()}`);
                      },
                      firstPageLoadingLabel: "Loading firms…",
                      renderRow: f => {
                        loaded.add(f.id);
                        updateStats();
                        return EntityRow({
                          avatar: Avatar({
                            initials: initials(f.name),
                            imageUrl: f.logoUrl,
                            alt: f.name,
                          }),
                          name: f.name,
                          sub: [
                            humanize(f.channel),
                            [f.hqCity, f.hqState].filter(Boolean).join(", "),
                            f.dissolvedYear
                              ? `dissolved ${f.dissolvedYear}`
                              : null,
                          ]
                            .filter(Boolean)
                            .join(" · "),
                          href: entityPath("firm", f),
                        });
                      },
                      empty: filterEmptyCopy(
                        filters,
                        "No firms match the selected filters.",
                        "No firms are available yet."
                      ),
                      onTotal: updateStats,
                    }),
                  ],
                })
              );
            } catch (err) {
              console.error("Firm directory failed to load", err);
              center.appendChild(
                AsyncStateCard({
                  kind: "transient",
                  title: "Could not load firms",
                  body: "Retry the request to refresh this directory.",
                  actionLabel: "Retry",
                  onAction: loadFirms,
                })
              );
            }
          };
          loadFirms();
        },
      });

      function readFirmFilters() {
        const params = new URLSearchParams(location.search);
        return {
          q: clean(params.get("q")),
          channel: clean(params.get("channel")),
          state: clean(params.get("state")).toUpperCase(),
          active: activeValue(params),
        };
      }

      function activeValue(params) {
        const active = clean(params.get("active")).toLowerCase();
        if (["true", "false"].includes(active)) return active;
        const status = clean(params.get("status")).toLowerCase();
        if (status === "active") return "true";
        if (["dissolved", "inactive"].includes(status)) return "false";
        return "";
      }

      function firmFilterForm(filters) {
        return el(
          "form",
          { class: "directory-filters", method: "get", action: "/firms" },
          textField("Firm", "q", filters.q, "Name or legal name"),
          textField("Channel", "channel", filters.channel, "wirehouse, ria"),
          textField("HQ state", "state", filters.state, "NY"),
          selectField("Status", "active", filters.active, ACTIVE_OPTIONS),
          el("button", { class: "filter-button", type: "submit" }, "Apply"),
          el(
            "a",
            {
              class: "feed-filter-clear",
              href: "/firms",
              "aria-disabled": activeFilters(filters) ? undefined : "true",
            },
            "Clear"
          )
        );
      }

      function directoryQuery(filters, cursor) {
        const qs = new URLSearchParams({ limit: String(PAGE_SIZE) });
        for (const [key, value] of Object.entries(filters)) {
          if (value) qs.set(key, value);
        }
        if (cursor) qs.set("cursor", cursor);
        return qs;
      }

      function textField(label, name, value, placeholder) {
        return el(
          "label",
          { class: "filter-field" },
          label,
          el("input", { name, value, placeholder })
        );
      }

      function selectField(label, name, value, options) {
        return el(
          "label",
          { class: "filter-field" },
          label,
          el(
            "select",
            { name },
            ...options.map(([optionValue, optionLabel]) =>
              el(
                "option",
                { value: optionValue, selected: optionValue === value },
                optionLabel
              )
            )
          )
        );
      }

      function clean(value) {
        return String(value || "").trim();
      }

      function activeFilters(filters) {
        return Object.values(filters).some(Boolean);
      }

      function activeFilterTitle(title, filters) {
        return activeFilters(filters) ? `${title} (filtered)` : title;
      }

      function filterEmptyCopy(filters, filteredCopy, defaultCopy) {
        return activeFilters(filters) ? filteredCopy : defaultCopy;
      }
    </script>
  </body>
</html>
