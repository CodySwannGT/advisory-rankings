<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firms — AdvisorBook</title>
    <link rel="stylesheet" href="/app.css?v=20260521-media" />
  </head>
  <body>
    <script type="module">
      // Directory page: cursor-paginated firm rows. UI from the design system.
      import {
        api,
        refreshMe,
        logout,
        search,
        humanize,
        initials,
        entityPath,
        clear,
      } from "/app.js?v=20260521-media";
      import {
        mountThreeColumnPage,
        SectionCard,
        AsyncStateCard,
        DetailsCard,
        EntityRow,
        Avatar,
        Paginated,
      } from "/design-system/index.js?v=20260521-media";

      const PAGE_SIZE = 50;

      mountThreeColumnPage({
        active: "firms",
        refreshMe,
        logout,
        search,
        pageTitle: "Firm directory",
        build({ center, right }) {
          const loadFirms = () => {
            clear(center);
            clear(right);
            let totalCount = null;
            let statsCard = DetailsCard({
              title: "Firm directory",
              pairs: [
                ["Loaded", "0"],
                ["Total", "Loading..."],
              ],
            });
            right.appendChild(statsCard);
            const loaded = new Set();
            const updateStats = total => {
              if (typeof total === "number") totalCount = total;
              const nextStatsCard = DetailsCard({
                title: "Firm directory",
                pairs: [
                  ["Loaded", loaded.size.toLocaleString()],
                  [
                    "Total",
                    typeof totalCount === "number"
                      ? totalCount.toLocaleString()
                      : "Loading...",
                  ],
                ],
              });
              statsCard.replaceWith(nextStatsCard);
              statsCard = nextStatsCard;
            };

            try {
              center.appendChild(
                SectionCard({
                  title: "All firms",
                  body: Paginated({
                    fetchPage: cursor => {
                      const qs = new URLSearchParams({
                        limit: String(PAGE_SIZE),
                      });
                      if (cursor) qs.set("cursor", cursor);
                      return api(`/PublicFirms?${qs.toString()}`);
                    },
                    renderRow: f => {
                      loaded.add(f.id);
                      updateStats();
                      return EntityRow({
                        avatar: Avatar({
                          initials: initials(f.name),
                          imageUrl: f.logoUrl,
                          alt: f.name,
                        }),
                        name: f.name,
                        sub: [
                          humanize(f.channel),
                          [f.hqCity, f.hqState].filter(Boolean).join(", "),
                          f.dissolvedYear
                            ? `dissolved ${f.dissolvedYear}`
                            : null,
                        ]
                          .filter(Boolean)
                          .join(" · "),
                        href: entityPath("firm", f),
                      });
                    },
                    empty: "No firms are available yet.",
                    onTotal: updateStats,
                  }),
                })
              );
            } catch (err) {
              console.error("Firm directory failed to load", err);
              center.appendChild(
                AsyncStateCard({
                  kind: "transient",
                  title: "Could not load firms",
                  body: "Retry the request to refresh this directory.",
                  actionLabel: "Retry",
                  onAction: loadFirms,
                })
              );
            }
          };
          loadFirms();
        },
      });
    </script>
  </body>
</html>
