<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Firms — AdvisorBook</title>
	<link rel="stylesheet" href="app.css" />
</head>
<body>
	<script type="module">
		// Directory page: every firm in the DB. UI from the design system.
		import { api, refreshMe, logout, initials } from './app.js';
		import {
			mountFullWidthPage, SectionCard, EmptyCard,
			EntityList, EntityRow,
		} from './design-system/index.js';

		mountFullWidthPage({
			active: 'firms',
			refreshMe,
			logout,
			build({ center }) {
				api('/PublicFirms').then((rows) => {
					center.appendChild(SectionCard({
						title: `All firms (${rows.length})`,
						body: EntityList({
							rows: rows.map((f) => EntityRow({
								avatar: initials(f.name),
								name: f.name,
								sub: [
									f.channel,
									[f.hqCity, f.hqState].filter(Boolean).join(', '),
									f.dissolvedYear ? `dissolved ${f.dissolvedYear}` : null,
								].filter(Boolean).join(' · '),
								href: `firm.html?id=${encodeURIComponent(f.id)}`,
							})),
						}),
					}));
				}).catch((err) => {
					center.appendChild(EmptyCard({ title: 'Could not load firms', body: String(err.message || err) }));
				});
			},
		});
	</script>
</body>
</html>
