<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Firms — AdvisoryRankings</title>
	<link rel="stylesheet" href="app.css" />
</head>
<body>
	<script type="module">
		import { api, el, mountPage, initials } from './app.js';
		mountPage({
			active: 'firms',
			build(layout) {
				const center = el('section', { class: 'center', style: 'grid-column: 1 / -1;' });
				layout.appendChild(center);
				api('/Firm/').then((rows) => {
					rows.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
					center.appendChild(el('div', { class: 'card' },
						el('div', { class: 'card-body' },
							el('h2', { class: 'card-title' }, `All firms (${rows.length})`),
							el('div', { class: 'entity-list' },
								...rows.map((f) =>
									el('a', { href: `firm.html?id=${encodeURIComponent(f.id)}`, style: 'text-decoration:none;color:inherit;' },
										el('div', { class: 'row' },
											el('div', { class: 'avatar' }, initials(f.name)),
											el('div', { class: 'body' },
												el('div', { class: 'name' }, f.name),
												el('div', { class: 'sub' }, [
													f.channel,
													[f.hqCity, f.hqState].filter(Boolean).join(', '),
													f.dissolvedYear ? `dissolved ${f.dissolvedYear}` : null,
												].filter(Boolean).join(' · ')),
											),
										))),
							),
						),
					));
				}).catch((err) => {
					center.appendChild(el('div', { class: 'card' },
						el('div', { class: 'card-body' },
							el('h2', { class: 'card-title' }, 'Could not load firms'),
							el('div', { class: 'empty' }, String(err.message || err)))));
				});
			},
		});
	</script>
</body>
</html>
