<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firms — AdvisorBook</title>
    <link rel="stylesheet" href="/app.css?v=20260521-media" />
  </head>
  <body>
    <script type="module">
      // Directory page: every firm in the DB. UI from the design system.
      import {
        api,
        refreshMe,
        logout,
        search,
        humanize,
        initials,
        entityPath,
        clear,
      } from "/app.js?v=20260521-media";
      import {
        mountThreeColumnPage,
        SectionCard,
        AsyncStateCard,
        DetailsCard,
        EntityList,
        EntityRow,
        Avatar,
      } from "/design-system/index.js?v=20260521-media";

      mountThreeColumnPage({
        active: "firms",
        refreshMe,
        logout,
        search,
        build({ center, right }) {
          const loadFirms = () => {
            clear(center);
            clear(right);
            api("/PublicFirms")
              .then(rows => {
                center.appendChild(
                  SectionCard({
                    title: `All firms (${rows.length.toLocaleString()})`,
                    body: EntityList({
                      rows: rows.map(f =>
                        EntityRow({
                          avatar: Avatar({
                            initials: initials(f.name),
                            imageUrl: f.logoUrl,
                            alt: f.name,
                          }),
                          name: f.name,
                          sub: [
                            humanize(f.channel),
                            [f.hqCity, f.hqState].filter(Boolean).join(", "),
                            f.dissolvedYear
                              ? `dissolved ${f.dissolvedYear}`
                              : null,
                          ]
                            .filter(Boolean)
                            .join(" · "),
                          href: entityPath("firm", f),
                        })
                      ),
                    }),
                  })
                );
                const channels = new Set(
                  rows.map(f => humanize(f.channel)).filter(Boolean)
                );
                const headquarters = rows.filter(
                  f => f.hqCity || f.hqState
                ).length;
                right.appendChild(
                  DetailsCard({
                    title: "Firm directory",
                    pairs: [
                      ["Firms", rows.length.toLocaleString()],
                      ["Channels", channels.size],
                      ["Headquarters on file", headquarters],
                      [
                        "Active firms",
                        rows
                          .filter(f => !f.dissolvedYear)
                          .length.toLocaleString(),
                      ],
                    ],
                  })
                );
              })
              .catch(err => {
                console.error("Firm directory failed to load", err);
                center.appendChild(
                  AsyncStateCard({
                    kind: "transient",
                    title: "Could not load firms",
                    body: "Retry the request to refresh this directory.",
                    actionLabel: "Retry",
                    onAction: loadFirms,
                  })
                );
              });
          };
          loadFirms();
        },
      });
    </script>
  </body>
</html>
